project_name: saturn

before:
  hooks:
    - go mod tidy

builds:
  - id: saturn
    main: ./cmd/saturn
    binary: saturn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
  header: |
    ## saturn {{ .Tag }}

    Install on macOS / Linux:

    ```sh
    curl -fsSL https://raw.githubusercontent.com/andrewn6/saturn/main/install.sh | sh
    ```

    Requires `tmux` at runtime; either `claude` or `opencode` for actual agent runs.
